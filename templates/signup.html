<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #667eea, #764ba2);
    text-align: center;
}
.container {
    background: white;
    width: 300px;
    margin: 100px auto;
    padding: 30px;
    border-radius: 10px;
}
input, button {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
}
button {
    background: #667eea;
    color: white;
    border: none;
}
</style>
</head>
<body>

<div class="container">
<h2>Signup</h2>
<form method="POST">
<input type="email" name="email" placeholder="Email" required><br>
<input type="password" name="password" placeholder="Password" required><br>
<button type="submit">Signup</button>
</form>
<p>Already have account? <a href="/login">Login</a></p>
</div>

</body>
</html>
